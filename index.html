<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allianz Vantage — Illustration Tools</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 48px;
    padding: 40px 20px;
  }

  .branding {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  .branding img {
    height: 44px;
  }

  .branding h1 {
    font-size: 15px;
    font-weight: 600;
    color: #666;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .buttons {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .product-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 220px;
    height: 80px;
    border-radius: 10px;
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.5px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: transform 0.12s, box-shadow 0.12s;
  }

  .btn-prsa {
    background: #003781;
    color: #fff;
    box-shadow: 0 4px 18px rgba(0,55,129,0.28);
  }

  .btn-prsa:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,55,129,0.38);
  }

  .btn-arf {
    background: #00A0B4;
    color: #fff;
    box-shadow: 0 4px 18px rgba(0,160,180,0.28);
  }

  .btn-arf:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(0,160,180,0.38);
  }

  .footer {
    font-size: 11px;
    color: #aaa;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<div class="container">

  <div class="branding">
    <img src="allianz-logo.svg" alt="Allianz">
    <h1>Allianz Vantage &mdash; Illustration Tools</h1>
  </div>

  <div class="buttons">
    <a class="product-btn btn-prsa" href="prsa_tool.html">PRSA</a>
    <a class="product-btn btn-arf" href="arf_tool.html">ARF</a>
  </div>

  <div class="footer">Allianz Global Life dac &middot; Internal use only</div>

</div>

</body>
</html>
